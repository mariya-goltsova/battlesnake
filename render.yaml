# Render deployment config (Blueprint).
# In the Render dashboard: New -> Blueprint -> connect this repo, and Render
# reads this file automatically. Or create a Web Service manually and copy the
# build/start commands below.
services:
  - type: web
    name: battlesnake-ml
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
